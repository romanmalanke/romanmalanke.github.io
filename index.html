    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #fcfbfa;
            --text-main: #1a1a1a;
            --text-muted: #706f6c;
            
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', system-ui, sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            min-height: 100dvh;
            padding: clamp(1.25rem, 4vh, 3rem) 8%;
        }

        main {
            max-width: 500px; 
            margin-top: 0;    
            margin-bottom: auto;
            text-align: left; 
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }

        .bio {
            font-size: 1.05rem;
            font-weight: 300;
            color: var(--text-main);
            margin-bottom: clamp(1rem, 2.5vh, 1.75rem);
        }

        .headshot {
            width: auto;
            height: auto;
            max-width: 400px;
            max-height: clamp(240px, 46vh, 460px);
            aspect-ratio: 4 / 5; 
            object-fit: cover;
            margin-bottom: clamp(1rem, 2.5vh, 1.75rem);
            filter: grayscale(100%); 
            transition: filter 0.5s ease;
        }

        .headshot:hover {
            filter: grayscale(0%);
        }

        .links-container {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            font-weight: 400;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            position: relative;
            padding-bottom: 2px;
            transition: color 0.3s ease;
        }

        a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: var(--text-main);
            transform-origin: bottom right;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        footer {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: -0.01em;
            color: #a8a6a2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: clamp(1.25rem, 3vh, 2.5rem);
        }

        @media (max-width: 600px) {
            body {
                padding: clamp(1.25rem, 4vh, 2.5rem) 7%;
            }
            h1 {
                font-size: 2rem;
            }
            .headshot {
                max-width: 100%;
                max-height: 38vh;
                margin-bottom: clamp(0.75rem, 2vh, 1.5rem);
            }
            .links-container {
                flex-direction: row;
                gap: 1.5rem;
            }
        }
